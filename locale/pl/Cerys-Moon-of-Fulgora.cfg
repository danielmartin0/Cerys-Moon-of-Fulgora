[entity-description]
cerys-fulgoran-radiative-tower=Ogrzewa pobliskie kafelki i obiekty za pomocą promieniowania podczerwonego. Zużywa paliwo stałe.
cerys-fulgoran-radiative-tower-contracted-container=Ogrzewa pobliskie kafelki i obiekty za pomocą promieniowania podczerwonego. Zużywa paliwo stałe.
cerys-fulgoran-radiative-tower-contracted-reactor=Ogrzewa pobliskie kafelki i obiekty za pomocą promieniowania podczerwonego. Zużywa paliwo stałe.
cerys-fulgoran-reactor-wreck-cleared=Wrak czekający na montaż rusztowania.
cerys-fulgoran-reactor=W większości sprawny starożytny reaktor rozszczepieniowy. Prawdopodobnie da się w jakiś sposób ograniczyć emanujące z niego niebezpieczne promieniowanie.
cerys-fulgoran-reactor-wreck=Niebezpiecznie zaniedbany starożytny reaktor rozszczepieniowy.
cerys-fulgoran-reactor-wreck-scaffolded=Niebezpiecznie zaniedbany starożytny reaktor rozszczepieniowy. Zamontowano rusztowanie.
cerys-fulgoran-reactor-scaffolded=Niebezpiecznie zaniedbany starożytny reaktor rozszczepieniowy. Zamontowano rusztowanie.
cerys-solar-wind-particle=Naładowane cząsteczki wiatru słonecznego są odbijane przez pole magnetyczne Fulgory, bombardując Cerys.
cerys-charging-rod=Osobliwie zaprojektowany element fulgoriańskiej technologii. Przechowuje i oddaje energię jak akumulator. 
cerys-gamma-radiation=Niebezpieczne dla zdrowia. Zatrzymywane przez zbiorniki z cieczą.
cerys-mixed-oxide-reactor=Wykorzystuje ogniwa paliwowe z tlenku mieszanego do generowania ciepła. Wydajność produkcji ciepła wzrasta po umieszczeniu w sąsiedztwie innych reaktorów.
cerys-neutron-dummy=Niebezpieczne dla zdrowia. Wykazuje tendencję do rozpraszania się w różnych kierunkach.
cerys-fulgoran-teleporter=Starożytny teleporter. Wydaje się się być w miarę sprawny.
cerys-fulgoran-cryogenic-plant=Starożytny zakład kriogeniczny, kluczowy dla fulgoriańskiej technologii na Cerys.
cerys-radiation-proof-inserter=Wkłada i wyjmuje z maszyn [item=cerys-radioactive-module-decayed] oraz [item=cerys-radioactive-module-charged].\nFiltr, kierunek i rozmiar stosu podajnika są ustawiane automatycznie na podstawie stanu maszyny.\nPrzesłanie sygnału sterowniczego [virtual-signal=signal-deny] wyłączy podajnik.
cerys-solar-ghost-maker=Tworzy [entity=cerys-solar-wind-particle-ghost]. Przydatne do celów testowych.
cerys-solar-wind-particle-ghost=Przydatna do celów testowych.

