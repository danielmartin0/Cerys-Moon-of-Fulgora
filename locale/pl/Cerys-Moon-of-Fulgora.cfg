[space-location-name]
cerys=Cerys

[space-location-description]
cerys=Pozbawiony atmosfery księżyc Fulgory pokryty grubą warstwą metanowego lodu. Wydaje się, iż starożytne wraki uwięzione w wiecznym lodzie dałoby się naprawić. Ogrzane obiekty znajdujące się na powierzchni Cerys z czasem oddają swoje ciepło do zewnętrznej skorupy księżyca. Zrzucanie ładunku wymaga specjalnej technologii (z wyjątkiem robotów konstrukcyjnych).

[tips-and-tricks-item-name]
cerys-briefing=Odprawa: Cerys
cerys-plutonium-generation=Wytwarzanie plutonu

[tips-and-tricks-item-description]
cerys-briefing=[planet=cerys] to pozbawiony atmosfery księżyc orbitujący wokół [planet=fulgora].\nCząsteczki słoneczne odbijane przez pole magnetyczne [planet=fulgora] przelatują tuż nad głowami inżynierów i zakłócają pracę bezzałogowych statków kosmicznych aż do opracowania technologii [technology=planetslib-cerys-cargo-drops].\nPowierzchnia jest pokryta wieloma warstwami [item=methane-ice] i usiana wrakami starożytnych maszyn. Wiele z nich można próbować uruchomić, w tym [entity=cerys-fulgoran-radiative-tower], która emituje niezbędne ciepło.\nOprócz metanowego lodu można tu znaleźć [entity=cerys-nuclear-scrap], [entity=cerys-ruin-medium], [entity=cerys-nitrogen-rich-minerals] oraz [entity=lithium-brine].\nNa Cerys utrzymanie stabilnie funkcjonującej bazy, szczególnie w dłuższym okresie, może być utrudnione ze względu na konieczność utrzymywania odpowiednio wysokiej temperatury.

cerys-plutonium-generation=Na Cerys [item=plutonium-239] ma szansę powstać za każdym razem, gdy [entity=cerys-solar-wind-particle] zderzy się z [item=uranium-238]. Należy odnotować następujące fakty dotyczące tego procesu:\n\n• [item=uranium-238] znajdujący się na taśmociągach ma 30-krotnie większą szansę na mutację w porównaniu do [item=uranium-238] przechowywanego w skrzyniach.\n\n• Tempo generowania [item=plutonium-239] jest wprost proporcjonalne do ilości [item=uranium-238]. Rozłożenie uranu na większą ilość skrzyń lub taśmociągów nie wpływa na tempo generowania plutonu.\n\n• [entity=cerys-solar-wind-particle], która niemal całkowicie się zatrzyma, zwyczajnie wyparuje.\n\n• Prawdopodobieństwo mutacji plutonu jest niezależne od prędkości [entity=cerys-solar-wind-particle].\n\n• Mutacja [item=uranium-238] w pojemnikach takich jak skrzynie może nadal wystąpić, nawet jeśli nie ma w nich wolnego miejsca, ponieważ wiatr słoneczny w razie potrzeby usunie z nich stos uranu.\n\n• [entity=cerys-solar-wind-particle] nie wywoła szansy na mutację przy wielokrotnym zderzeniu z tym samym pojemnikiem lub kafelkiem taśmociągu; konieczne jest zderzenie z innymi pojemnikami lub taśmociągami, zanim pierwotny obiekt zostanie ponownie uwzględniony do procesu mutacji.\n\n• Widmowe naładowane cząsteczki traktują inne obiekty tak, jakby te były w pełni naładowane.\n\n• Ze względów wydajnościowych [entity=cerys-solar-wind-particle] jest symulowana wolniej, gdy żaden gracz nie patrzy na Cerys, ale szanse na mutację są utrzymane na takim poziomie, aby tempo generowania [item=plutonium-239] pozostawało bez zmian.

