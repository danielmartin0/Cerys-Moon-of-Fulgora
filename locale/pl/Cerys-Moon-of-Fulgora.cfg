cerys-lubricant-synthesis=Używając litu jako katalizatora, fulgoriańskie zakłady kriogeniczne mogą kondensować węglowodory w smar.
cerys-upgrade-fulgoran-cryogenic-plant-quality=Podnosi jakość zakładu, który go wytwarza, o jeden poziom. Jakość składników musi być o jeden poziom wyższa niż sam zakład.
cerys-upgrade-fulgoran-crusher-quality=Podnosi jakość kruszarki, która ją wytwarza, o jeden poziom. Jakość składników musi być o jeden poziom wyższa niż sama kruszarka.
cerys-nitric-acid=Produkcja kwasu azotowego poprzez elektrolizę amoniaku i wody.
cerys-excavate-nuclear-reactor=Ujawnia wrak fulgoriańskiego reaktora.

