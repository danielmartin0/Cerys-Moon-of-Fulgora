[mod-setting-description]
cerys-asteroid-chunks-drop-on-belts=Upuszczanie fragmentów na taśmociągi jest domyślnie włączone, aby umożliwić zautomatyzowane zbieranie asteroid oparte wyłącznie na taśmociągach.
cerys-prevent-cargo-drops-without-technology=Gracze są zwolnieni z tego ograniczenia.
cerys-disable-solar-wind-when-not-looking-at-surface=Domyślnie zużycie UPS przez wiatr słoneczny jest drastycznie redukowane, jeśli żaden gracz nie patrzy na Cerys. To ustawienie całkowicie wyłącza ruch wiatru słonecznego w takim przypadku, w pełni optymalizując UPS. Ma to wpływ na rozgrywkę.
cerys-disable-flare-stack-item-venting=Gdy mod Flare Stack autorstwa GotLag został przeniesiony do wersji 2.0, jego obiekty do usuwania przedmiotów zostały przeniesione jako spalarnie. Ponieważ Space Age wprowadza recykler, to ustawienie jest domyślnie włączone.
cerys-technology-compatibility-mode=Technologia fulgoriańskiej kriogeniki korzysta z funkcji wersji 2.0, która nie jest obsługiwana przez wszystkie mody wrażliwe na receptury. To ustawienie zmienia wyzwalacz technologii tak, że zamiast odblokowywać się przez wykonywanie receptur, technologia jest odblokowywana przez wytwarzanie przedmiotów (Część do naprawy starożytnych struktur).
cerys-solar-wind-spawn-rate-percentage=Służy optymalizacji wydajności. Ma wpływ na rozgrywkę.
cerys-disable-quality-mechanics=Ustawienie kompatybilności. Usuwa receptury na ulepszanie jakości fulgoriańskich maszyn.
cerys-enforce-vanilla-recycling-recipes=Zapewnia, że niektóre receptury recyklingu zachowują swoją podstawową formę, aby zwiększyć szansę na grywalność Cerys. Dotyczy: rur, rur ciepłowniczych, nadajników, turbin parowych, wirówek, kół zębatych, kabli miedzianych, obwodów elektronicznych, zaawansowanych obwodów, procesorów, betonu, paliwa stałego, płyt stalowych, płyt miedzianych, płyt żelaznych, cegieł kamiennych, plastiku, holmowych płytek. Uwaga: Niektóre nadpisania zachowują się inaczej, gdy zainstalowany jest mod Krastorio 2.
cerys-dynamic-lighting=Włączenie tego ustawienia może powodować artefakty graficzne przy niskich ustawieniach grafiki lub w świecie wygenerowanym przed wersją Cerys v2. Wpływa na energię słoneczną.
cerys-infinite-braking-technology=Niezbędne do uzyskania pełnych korzyście związanych z wykorzystaniem paliwa z plutonu. Domyślnie wyłączone, ponieważ Cerys jest modem zamkniętym.
cerys-sandbox-mode=Usuwa ograniczenia dotyczące zrzutów ładunku na Cerys. Omija to jedną z mechanik na księżycu, ale przyspiesza rozgrywkę w trybie dowolnym.
cerys-use-fulgora-starmap-graphic=Mody zmieniające wygląd Fulgory zmienią tło za Cerys. OSTRZEŻENIE: Powoduje to, że tło Fulgory jest bardziej rozmyte w podstawowym Cerys.
cerys-undo-marathon-multiplier=Może być użyte do zrównoważenia ustawienia mapy dotyczącego mnożnika ceny technologii ('maraton'). Na przykład, jeśli to ustawienie wynosi 3, cena (nieskończonych) technologii Cerys zostanie obniżona 3-krotnie. Mogą wystąpić błędy wynikające z zaokrągleń.
cerys-fusion-reactor-requires-radiative-tower=Sprawia, że technologia wieży radiacyjnej staje się wymogiem dla reaktorów fuzyjnych na Aquilo, dzięki czemu Cerys jest konieczną częścią postępu w grze.