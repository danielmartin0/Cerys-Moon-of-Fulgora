[item-description]
mixed-oxide-fuel-cell=Wykonane z rozszczepieniowych izotopów uranu i plutonu.
plutonium-238=Radioaktywny izotop plutonu. Cenne źródło energii.
plutonium-239=Rozszczepieniowy izotop plutonu. Wydaje się być uzyskiwany w dość niekonwencjonalny sposób.
cerys-fulgoran-reactor-scaffold=Jeśli zostanie umieszczone bezpośrednio na fulgoriańskim reaktorze bez żadnych blokujących go asteroid, rozpocznie się proces naprawy. Możesz zwiększyć jakość naprawianego reaktora, budując na istniejącym rusztowaniu (w trybie wymuszonym (ctrl+shift+LPM)) rusztowanie wysokiej jakości.
cerys-hydrogen-bomb=Po wystrzeleniu - trzymaj się z daleka.
cerys-discover-fulgoran-cryogenics=Reprezentuje specjalną formułę, która odblokowuje [technology=cerys-fulgoran-cryogenics].
cerys-radioactive-module-charged=Wariant modułu produktywności poziomu 4, który z czasem degraduje do odpowiednika poziomu 2.5, ale może być ponownie naładowany w wirówce przy użyciu [item=plutonium-239].\nMoże być wkładany do maszyn przez [item=cerys-radiation-proof-inserter].
cerys-radioactive-module-decayed=Zużyty [item=cerys-radioactive-module-charged], o połowę od niego słabszy, aż do czasu naładowania w wirówce.\nMoże być wyciągany z maszyn przez [item=cerys-radiation-proof-inserter].
cerys-overclock-module=Działa jak dwa [item=speed-module-3] w jednym wariancie modułu poziomu 4. Blokuje on jednak bonusy do produktywności.

