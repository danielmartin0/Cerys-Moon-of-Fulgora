[technology-description]
moon-discovery-cerys=Pozbawiony atmosfery księżyc Fulgory pokryty grubą warstwą metanowego lodu. Starożytne wraki, w tym kolosalny reaktor jądrowy, są uwięzione w wiecznym lodzie - wydaje się, że dałoby się je naprawić. Podlega łagodnemu wiatrowi słonecznemu ze wzglęu na wpływ pola magnetycznego Fulgory.\n\nOdwiedzenie Fulgory nie jest wymagane w pierwszej kolejności. Zrzucanie ładunku na Cerys wymaga specjalnej technologii (z wyjątkiem robotów konstrukcyjnych). Ogrzane obiekty znajdujące się na powierzchni Cerys z czasem oddają swoje ciepło do zewnętrznej skorupy księżyca.
cerys-nuclear-scrap-recycling=Pozostałości fulgoriańskiego przemysłu jądrowego na Cerys - mogą być poddawane ręcznemu lub maszynowemu recyklingowi.
cerys-nitrogen-rich-mineral-processing=Ługowanie minerałów bogatych w azot za pomocą kwasu siarkowego uwalnia związki azotowe i wytwarza rudę żelaza.
cerys-fulgoran-cryogenics=Odblokowuje szereg możliwości w [entity=cerys-fulgoran-cryogenic-plant].
cerys-electromagnetic-tooling=Urządzenia do przechowywania energii i eksperymentowania z polami elektromagnetycznymi.
cerysian-science-pack=Umożliwia dalsze badania nad fulgoriańskimi technologiami pochodzącymi z Cerys.
cerys-gas-venting=Skuteczne metody usuwania gazów oraz (na powierzchniach pod ciśnieniem) płynów
cerys-lubricant-synthesis=Pozwala na syntezę smaru z węglowodorów przy użyciu litu jako katalizatora.
cerys-advanced-structure-repair=Pozwala na zaawansowane naprawy i ulepszenia fulgoriańskich maszyn, w tym wytwarzanie rusztowania służacego do zainicjowania napraw fulgoriańskiego reaktora.
cerys-mixed-oxide-waste-reprocessing=Zużyte ogniwa paliwowe z tlenku mieszanego mogą być przetwarzane w więcej Pu-239 oraz inne wysoce radioaktywne izotopy.
cerys-cargo-drops=Pozwala na zrzuty ładunków na Cerys bez zakłóceń ze strony pola magnetycznego.
cerys-plutonium-weaponry=Niszczycielska broń mogąca spustoszyć ogromne obszary.
cerys-applications-of-radioactivity=Technologia wykorzystująca radioaktywne izotopy plutonu.
cerys-radiative-heaters=Pozwala na budowę grzejników radiacyjnych oraz daje możliwość wydobywania wież radiacyjnych na Cerys.
cerys-reactor-fuel=Ogniwa paliwowe do reaktorów rozszczepieniowych wykonane z wielu pierwiastków.
cerys-radioactive-module=Wariant modułu produktywności poziomu 4, który z czasem degraduje do odpowiednika poziomu 2.5. Może być wkładany do maszyn przez [item=cerys-radiation-proof-inserter].
cerys-overclock-module=Wariant modułu prędkości poziomu 4, który działa jak dwa [item=speed-module-3]. Blokuje on jednak bonusy do produktywności.
cerys-holmium-recrystalization=Zaawansowane przetwarzanie rudy holmu.
cerys-mixed-oxide-reactors=Ulepszony reaktor rozszczepieniowy do użytku poza powierzchniami planet.
cerys-legacy-reactor-fuel-productivity=W Cerys v4.0 moduły produktywności zostały usunięte z receptury ogniwa paliwowego. Aby nie psuć istniejących platform kosmicznych, klasyczne zapisy odblokowują tę sekretną technologię. Można ją wyłączyć w ustawieniach moda.

